name: Build Android App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔍 Verificar SDK pré-instalada
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME/ || echo "ANDROID_HOME não encontrado"
          ls -la /usr/local/lib/android/sdk/ 2>/dev/null || echo "SDK em /usr/local/lib/android/sdk/ não encontrado"
          # Tentar localizar o sdkmanager
          which sdkmanager 2>/dev/null || find / -name "sdkmanager" -type f 2>/dev/null | head -5

      - name: ✅ Aceitar licenças do Android SDK
        run: |
          # O runner do GitHub já tem Android SDK pré-instalado
          SDK_MANAGER=$(find / -name "sdkmanager" -type f 2>/dev/null | head -1)
          if [ -n "$SDK_MANAGER" ]; then
            yes | $SDK_MANAGER --licenses > /dev/null 2>&1 || true
            echo "Licenças aceitas via $SDK_MANAGER"
          else
            echo "sdkmanager não encontrado, tentando via gradle..."
          fi
          # Garantir que o ANDROID_HOME está correto
          if [ -d "/usr/local/lib/android/sdk" ]; then
            echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          fi

      - name: 🐘 Configurar Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"

      - name: 🔨 Compilar o app (debug)
        run: ./gradlew assembleDebug
        env:
          CI: true

      - name: 🔨 Compilar o app (release)
        run: ./gradlew assembleRelease
        env:
          CI: true

      - name: 📦 Upload do APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: 📦 Upload do APK Release
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: 📋 Listar outputs
        run: |
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Nenhum APK debug encontrado"
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "Nenhum APK release encontrado"
