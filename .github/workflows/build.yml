name: Build Android App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Configurar Android SDK (pré-instalado)
        run: |
          # Usar SDK pré-instalado no runner
          SDK_DIR="/usr/local/lib/android/sdk"
          if [ -d "$SDK_DIR" ]; then
            echo "ANDROID_HOME=$SDK_DIR" >> $GITHUB_ENV
            echo "ANDROID_SDK_ROOT=$SDK_DIR" >> $GITHUB_ENV
            echo "Android SDK encontrado em: $SDK_DIR"
            ls -la $SDK_DIR/
          fi
          # Aceitar licenças
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || \
          yes | $SDK_DIR/cmdline-tools/12.0/bin/sdkmanager --licenses 2>/dev/null || \
          yes | $SDK_DIR/cmdline-tools/*/bin/sdkmanager --licenses 2>/dev/null || true
          echo "✅ Licenças aceitas"

      - name: 🐘 Gerar wrapper do Gradle
        run: |
          # Instalar Gradle para gerar o wrapper.jar
          if ! command -v gradle &> /dev/null; then
            curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /opt/
            ln -sf /opt/gradle-8.5/bin/gradle /usr/local/bin/gradle
          fi
          gradle wrapper --gradle-version 8.5
          echo "✅ Wrapper gerado"

      - name: 🔨 Compilar app (debug)
        run: ./gradlew assembleDebug
        env:
          CI: true

      - name: 🔨 Compilar app (release)
        run: ./gradlew assembleRelease
        env:
          CI: true

      - name: 📦 Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: 📦 Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: 📋 Listar APKs gerados
        run: |
          echo "=== APK Debug ==="
          ls -lh app/build/outputs/apk/debug/ 2>/dev/null || echo "Nenhum"
          echo "=== APK Release ==="
          ls -lh app/build/outputs/apk/release/ 2>/dev/null || echo "Nenhum"
